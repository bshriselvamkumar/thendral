<!DOCTYPE html>
<html>
<head>
<title>Post</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="title" class="gradient"></h1>
<p id="content"></p>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");

const data = {
  detox: {
    title:"Body Detox Program",
    content:"This program helps cleanse your body naturally, improving liver and kidney function..."
  },
  mind: {
    title:"Mind Energy Program",
    content:"Enhances memory, focus and brain performance..."
  },
  kubera: {
    title:"Kubera Yogam",
    content:"Teaches financial discipline and wealth attraction..."
  },
  healing: {
    title:"Healing Training",
    content:"Focuses on spiritual and emotional healing..."
  }
};

document.getElementById("title").innerText = data[type].title;
document.getElementById("content").innerText = data[type].content;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
.post-container {
  max-width: 800px;
  margin: 50px auto;
  padding: 20px;
}

.post-title {
  font-size: 32px;
  margin-bottom: 10px;
}

.post-date {
  color: gray;
  margin-bottom: 20px;
}

.post-content {
  line-height: 1.6;
  font-size: 18px;
}
</style>

</head>

<body>

<!-- SAME HEADER (CONSISTENCY) -->
<div class="top-bar">
  <a href="index.html">Home</a>
  <a>Programs</a>
  <a>Contact</a>
</div>

<div class="hero">
  <img src="images/logo.png" class="logo">
</div>

<div class="nav">
  <a href="index.html">HOME</a>
  <a>PROGRAMS</a>
  <a>CONTACT</a>
</div>

<!-- POST CONTENT -->
<div class="post-container">

  <h1 id="title" class="post-title">Loading...</h1>
  <p id="date" class="post-date"></p>
  <p id="content" class="post-content"></p>

</div>

<script>

// 🔥 SAME CONFIG (IMPORTANT)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// GET POST ID FROM URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// LOAD POST
db.collection("posts").doc(id).get().then(doc => {
  if (doc.exists) {
    const post = doc.data();

    document.getElementById("title").innerText = post.title;
    document.getElementById("date").innerText = post.date;
    document.getElementById("content").innerText = post.content;
  } else {
    document.getElementById("title").innerText = "Post not found";
  }
});

</script>

</body>
</html>

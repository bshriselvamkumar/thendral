</div>

</div>

<!-- NAV -->
<div class="nav">
  <a href="#">ABOUT</a>
  <a href="#">PROGRAMS</a>

<!-- POSTS -->
<div class="posts fade">

<!-- SCROLL SCRIPT -->
<script>
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  faders.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      el.classList.add('show');
    }
  });
});
</script>

</body>

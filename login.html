<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<script src="auth.js"></script>

<style>
body {
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f4f6f8;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: red;
  color: white;
  border: none;
}

a {
  display: block;
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="box">
  <h2>Login</h2>

  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <a href="signup.html">Create Account</a>
</div>

</body>
</html>
